<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Slideshow</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      background:#f0f2f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    /* SLIDESHOW */
    .slideshow-container{
      position:relative;
      width:1000px;
      height:300px;
      overflow:hidden;
      border-radius:18px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .mySlides{
      display:none;
      width:100%;
      height:100%;
      animation:fade 1s;
    }

    /* Slide Layout */
    .slide{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:40px 60px;
      color:white;
    }

    .text h1{
      font-size:48px;
      margin-bottom:15px;
    }

    .text p{
      font-size:22px;
      line-height:1.5;
    }

    .icon{
      font-size:120px;
    }

    /* Slide Colors */
    .slide1{
      background:linear-gradient(135deg,#2193b0,#6dd5ed);
    }

    .slide2{
      background:linear-gradient(135deg,#11998e,#38ef7d);
    }

    .slide3{
      background:linear-gradient(135deg,#fc4a1a,#f7b733);
    }

    /* Buttons */
    .prev, .next{
      cursor:pointer;
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:white;
      font-size:28px;
      font-weight:bold;
      padding:12px 18px;
      background:rgba(0,0,0,0.3);
      border-radius:50%;
      user-select:none;
      transition:0.3s;
    }

    .prev:hover,
    .next:hover{
      background:rgba(0,0,0,0.6);
    }

    .prev{
      left:15px;
    }

    .next{
      right:15px;
    }

    /* Dots */
    .dots{
      position:absolute;
      bottom:15px;
      width:100%;
      text-align:center;
    }

    .dot{
      cursor:pointer;
      height:15px;
      width:15px;
      margin:0 5px;
      background:#ddd;
      border-radius:50%;
      display:inline-block;
      transition:0.3s;
    }

    .active,
    .dot:hover{
      background:white;
    }

    @keyframes fade{
      from{opacity:0.4;}
      to{opacity:1;}
    }

  </style>
</head>

<body>

  <div class="slideshow-container">

    <!-- Slide 1 -->
    <div class="mySlides">
      <div class="slide slide1">
        <div class="text">
          <h1>Web Development</h1>
          <p>
            เรียนรู้การสร้างเว็บไซต์ด้วย<br>
            HTML CSS และ JavaScript
          </p>
        </div>

        <div class="icon">💻</div>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="mySlides">
      <div class="slide slide2">
        <div class="text">
          <h1>Graphic Design</h1>
          <p>
            ออกแบบกราฟิกและสื่อดิจิทัล<br>
            ด้วยเครื่องมือระดับมืออาชีพ
          </p>
        </div>

        <div class="icon">🎨</div>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="mySlides">
      <div class="slide slide3">
        <div class="text">
          <h1>Data Science</h1>
          <p>
            วิเคราะห์ข้อมูลและสร้างโมเดล AI<br>
            สำหรับงานยุคดิจิทัล
          </p>
        </div>

        <div class="icon">📊</div>
      </div>
    </div>

    <!-- Buttons -->
    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>

    <!-- Dots -->
    <div class="dots">
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
    </div>

  </div>

  <script>

    let slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n){
      showSlides(slideIndex += n);
    }

    function currentSlide(n){
      showSlides(slideIndex = n);
    }

    function showSlides(n){

      let i;
      let slides = document.getElementsByClassName("mySlides");
      let dots = document.getElementsByClassName("dot");

      if(n > slides.length){
        slideIndex = 1;
      }

      if(n < 1){
        slideIndex = slides.length;
      }

      for(i = 0; i < slides.length; i++){
        slides[i].style.display = "none";
      }

      for(i = 0; i < dots.length; i++){
        dots[i].className = dots[i].className.replace(" active","");
      }

      slides[slideIndex-1].style.display = "block";
      dots[slideIndex-1].className += " active";
    }

    /* Auto Slide */
    setInterval(() => {
      plusSlides(1);
    }, 4000);

  </script>

</body>
</html>
